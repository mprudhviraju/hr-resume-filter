AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: HR Resume Filter API (Lambda + HTTP API + DynamoDB)

Parameters:
  AllowedOrigins:
    Type: String
    Default: '*'
    Description: >-
      Comma-separated CORS origins (e.g. https://main.xxxx.amplifyapp.com).
      Use * for development only.
  OpenAIApiKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: >-
      Optional default OpenAI API key (users can also send X-OpenAI-API-Key).
      Leave empty if the client always supplies a key.
  OpenAIModel:
    Type: String
    Default: 'gpt-4o'
    Description: OpenAI model id (default gpt-4o)
  GoogleClientId:
    Type: String
    Default: ''
    Description: Google OAuth 2.0 Client ID for authentication

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: production
        JOB_TABLE_NAME: !Ref JobsTable
        ALLOWED_ORIGINS: !Ref AllowedOrigins
        OPENAI_API_KEY: !Ref OpenAIApiKey
        OPENAI_MODEL: !Ref OpenAIModel
        USERS_TABLE_NAME: !Ref UsersTable
        RUNS_TABLE_NAME: !Ref RunsTable
        UPLOAD_BUCKET: !Ref UploadBucket
        GOOGLE_CLIENT_ID: !Ref GoogleClientId

Resources:
  UploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-uploads-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
          - Id: AutoDelete
            Status: Enabled
            ExpirationInDays: 1
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [PUT]
            AllowedHeaders: ['*']
            MaxAge: 600

  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-jobs'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: jobId
          AttributeType: S
      KeySchema:
        - AttributeName: jobId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-users'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  RunsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${AWS::StackName}-runs'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userEmail
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: N
      KeySchema:
        - AttributeName: userEmail
          KeyType: HASH
        - AttributeName: createdAt
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
        AllowHeaders:
          - Content-Type
          - X-OpenAI-API-Key
          - Authorization
        MaxAge: 600

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Health check and create analysis jobs
      Handler: lambda/api.handler
      CodeUri: .
      MemorySize: 1024
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTable
        - S3CrudPolicy:
            BucketName: !Ref UploadBucket
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/health
            Method: GET
        UploadUrls:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/upload-urls
            Method: POST
        CreateJob:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/analyze
            Method: POST
        GetApiKey:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/settings/api-key
            Method: GET
        PutApiKey:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/settings/api-key
            Method: PUT
        DeleteApiKey:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/settings/api-key
            Method: DELETE
        AuthVerify:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/auth/verify
            Method: POST
        ListUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/users
            Method: GET
        AddUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/users
            Method: POST
        RemoveUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/users/{email}
            Method: DELETE
        ListRuns:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/runs
            Method: GET
        GetRun:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/runs/{createdAt}
            Method: GET
        DeleteRun:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /api/runs/{createdAt}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - src/lambda/api.ts

  StreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: SSE stream for resume analysis progress and results
      Handler: lambda/stream.handler
      CodeUri: .
      MemorySize: 2048
      Timeout: 900
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref JobsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RunsTable
        - S3CrudPolicy:
            BucketName: !Ref UploadBucket
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins:
            - '*'
          AllowMethods:
            - GET
          AllowHeaders:
            - Content-Type
          MaxAge: 600
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Sourcemap: true
        EntryPoints:
          - src/lambda/stream.ts

Outputs:
  HttpApiUrl:
    Description: API base URL — set as VITE_API_BASE_URL in Amplify
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  UploadBucketName:
    Description: S3 bucket for resume uploads
    Value: !Ref UploadBucket
  JobsTableName:
    Description: DynamoDB jobs table
    Value: !Ref JobsTable
  UsersTableName:
    Description: DynamoDB allowed users table
    Value: !Ref UsersTable
  RunsTableName:
    Description: DynamoDB analysis runs table
    Value: !Ref RunsTable
  ApiFunctionArn:
    Description: Create-job Lambda ARN
    Value: !GetAtt ApiFunction.Arn
  StreamFunctionArn:
    Description: SSE stream Lambda ARN
    Value: !GetAtt StreamFunction.Arn
  StreamFunctionUrl:
    Description: Function URL for SSE streaming
    Value: !GetAtt StreamFunctionUrl.FunctionUrl
